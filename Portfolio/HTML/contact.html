    <form method="post">

        <fieldset>
            <legend><strong>Registration Form</strong></legend>

            <table>

                <tr>
                    <td><label for="name">Name:</label></td>
                    <td><input type="text" id="name" name="name" required></td>
                </tr>

                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>

                <tr>
                    <td><label for="comp">Company:</label></td>
                    <td><input type="text" id="comp" name="comp" required></td>
                </tr>

                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender" value="male" required> Male
                        <input type="radio" name="gender" value="female"> Female
                    </td>
                </tr>

                <tr>
                    <td><label>Skills:</label></td>
                    <td>
                        <input type="checkbox" value="Web Developement"> Web Developement
                        <input type="checkbox" value="Graphics Design"> Graphics Design
                        <input type="checkbox" value="Fashion Design"> Fashion Design
                        <input type="checkbox" value="Digital Marketing"> Digital Marketing
                    </td>
                </tr>

                <tr>
                    <td><label for="topic">Topic:</label></td>
                    <td>
                        <select id="topic" name="topic" required>
                            <option>Project</option>
                            <option>Thesis</option>
                            <option>Job</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="cdate">Consultataion Date: </label></td>
                    <td><input type="date" id="cdate1" name="Consultation Date" required></td>
                </tr>

                <tr>
                    <td><label for="msg">Message:</label></td>
                    <td>
                        <textarea id="msg" rows="4" cols="30"></textarea>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input class="Button1" type="submit" value="Register">
                        <input class="Button1" type="reset">
                    </td>
                </tr>
